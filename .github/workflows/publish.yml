name: publish

# Publishes voxeye via PyPI Trusted Publishing (OIDC — no API tokens/secrets):
#   • a published GitHub Release  → PyPI  (the live path — 0.1.0 shipped this way)
#   • manual run (workflow_dispatch) → TestPyPI (dry-run) or PyPI
# PyPI trusted publisher + the `pypi` environment are configured. TestPyPI (`testpypi`
# environment) is optional — set it up to use the dry-run path.
# Trusted publishing docs: https://docs.pypi.org/trusted-publishers/
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Pick the GitHub Environment (configure trusted publishing per index there).
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Empty → PyPI (the action's default); TestPyPI for a manual dry-run.
          repository-url: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'https://test.pypi.org/legacy/' || '' }}
